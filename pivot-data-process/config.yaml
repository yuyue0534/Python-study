# ============================================================
# 透视表自动化配置文件
# 同事只需修改此文件，不需要动 pivot_runner.py
# ============================================================

# 【必填】原始数据文件路径（SQL 导出的 xlsx）
# 支持相对路径（相对于 pivot_runner.py 所在目录）或绝对路径
input_file: "data/export.xlsx"

# 【必填】原始数据所在的 Sheet 名称
input_sheet: "raw"

# ============================================================
# 筛选条件（固定不变，如需调整请联系负责人）
# ============================================================
filters:
  SCHEME_CODE: "FD"       # 方案代码
  BILL_PERIOD: 202511     # 账单期数（整数格式，如 202511）

# ============================================================
# 输出设置
# ============================================================
output:
  folder: "output"                    # 输出文件夹（自动创建）
  filename_prefix: "pivot_result"     # 文件名前缀，后缀自动加时间戳
  sheet_name: "透视表"                # 输出 Sheet 名称
